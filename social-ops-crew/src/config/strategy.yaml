# Strategy Config — Strategist Agent modifies this weekly, other agents read it.
# Human approval required before Strategist writes changes.

scout:
  keywords_priority:
    - keyword: "AI agents finance"
      weight: 1.0
    - keyword: "fintech automation"
      weight: 1.0
    - keyword: "LLM trading"
      weight: 0.8
    - keyword: "AI regulation banking"
      weight: 1.0

  kol_watchlist:
    # Override per-user in .env or local config
    - "@example_kol_1"
    - "@example_kol_2"

  scan_queries_per_run: 8

planner:
  weekly_mix:
    deep_posts: 1-2
    fast_posts: 2-3
    total_max: 5

  hook_formula_weights:
    data_shock: 1.0
    counter_intuitive: 1.0
    problem_solution: 1.0
    identity_mirror: 1.0

  platform_priority:
    - linkedin
    - x
    - xiaohongshu

  best_times:
    linkedin: "08:30 EST"
    x: "12:00 EST"
    xiaohongshu: "21:00 CST"

  min_hook_score: 7

engager:
  max_comments_per_hour: 5
  max_comments_per_day: 20
  min_interval_seconds: 120
  cooldown_if_flagged: "24h"
  auto_approve_tiers: [3]  # Only Tier 3 (own post replies) auto-approved
  comment_min_words: 30
  comment_max_words: 150

analyst:
  snapshot_intervals_hours: [2, 24, 48]
  min_save_rate_target: 0.01  # 1%

publisher:
  max_posts_per_day: 3
  require_human_approval: true  # First 30 days
